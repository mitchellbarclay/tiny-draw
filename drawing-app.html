function doTornado(){
  saveHistory();
  lastStrokePoints=null;
  var w=canvasW,h=canvasH;
  var topW=Math.min(w*0.22,280);
  var botW=Math.max(topW*0.08,16);
  var lean=Math.max(40,topW*0.35);
  var startX=-topW*0.7;
  var endX=w+topW*0.9;
  var totalFrames=130;
  var frame=0;
  var debris=[];
  var debrisCols=['#5a4a3a','#8a7060','#403838','#605860','#a59a8a','#3f3a3a'];

  function clearWipe(cx){
    ctx.fillStyle=BG_CSS;
    ctx.beginPath();
    ctx.moveTo(-100,-10);
    ctx.lineTo(cx+lean,-10);
    ctx.lineTo(cx-lean,h+10);
    ctx.lineTo(-100,h+10);
    ctx.closePath();
    ctx.fill();
  }

  function drawTornado(cx){
    var bands=28;
    for(var i=0;i<bands;i++){
      var t=i/(bands-1);
      var y=t*h;
      var bw=botW+(topW-botW)*Math.pow(1-t,1.7);
      var bh=bw*0.20;
      var phase=frame*0.32+i*0.85;
      var wobble=Math.sin(phase)*bw*0.08;
      var bcx=cx+wobble;
      ovCtx.globalAlpha=0.16;
      ovCtx.fillStyle='#3a3540';
      ovCtx.beginPath();
      ovCtx.ellipse(bcx,y,bw*1.18,bh*1.4,0,0,Math.PI*2);
      ovCtx.fill();
      ovCtx.globalAlpha=0.55;
      ovCtx.fillStyle='#7d7585';
      ovCtx.beginPath();
      ovCtx.ellipse(bcx,y,bw,bh,0,0,Math.PI*2);
      ovCtx.fill();
      var hx=bcx+Math.cos(phase*1.3)*bw*0.55;
      var hy=y+Math.sin(phase*1.3)*bh*0.5;
      ovCtx.globalAlpha=0.42;
      ovCtx.fillStyle='#d8d3dd';
      ovCtx.beginPath();
      ovCtx.ellipse(hx,hy,bw*0.22,bh*0.7,0,0,Math.PI*2);
      ovCtx.fill();
    }
    ovCtx.globalAlpha=1;
  }

  function spawnDebris(cx){
    for(var i=0;i<3;i++){
      debris.push({
        baseAngle:Math.random()*Math.PI*2,
        angVel:0.18+Math.random()*0.12,
        radius:30+Math.random()*100,
        radVel:-0.3+Math.random()*0.6,
        y:60+Math.random()*(h-120),
        vy:-0.6-Math.random()*1.4,
        size:1.5+Math.random()*4,
        color:debrisCols[Math.floor(Math.random()*debrisCols.length)],
        life:0.8+Math.random()*0.4,
        decay:0.008+Math.random()*0.012
      });
    }
  }

  function animTornado(){
    var p=frame/totalFrames;
    var cx=startX+(endX-startX)*p;
    clearWipe(cx);
    ovCtx.clearRect(0,0,canvasW,canvasH);
    drawTornado(cx);
    if(frame%2===0)spawnDebris(cx);
    for(var i=debris.length-1;i>=0;i--){
      var d=debris[i];
      d.baseAngle+=d.angVel;
      d.radius=Math.max(18,d.radius+d.radVel);
      d.y+=d.vy;
      d.life-=d.decay;
      if(d.life<=0||d.y<-30){debris.splice(i,1);continue;}
      var dx=cx+Math.cos(d.baseAngle)*d.radius;
      ovCtx.globalAlpha=Math.min(1,d.life);
      ovCtx.fillStyle=d.color;
      ovCtx.beginPath();
      ovCtx.arc(dx,d.y,d.size,0,Math.PI*2);
      ovCtx.fill();
    }
    ovCtx.globalAlpha=1;
    frame++;
    if(frame<totalFrames)requestAnimationFrame(animTornado);
    else{
      ovCtx.clearRect(0,0,canvasW,canvasH);
      ctx.fillStyle=BG_CSS;
      ctx.fillRect(0,0,w,h);
    }
  }
  animTornado();
}

// === FIRE BRUSH ===
// Procreate-style flame stamps. Pre-baked soft flame silhouettes (six shape
// variants) are dropped at fixed spacing along the stroke with size, position,
// and rotation jitter. Always points up — buoyancy is implied by orientation,
// not simulation. Color picker drives the base hue; the gradient inside each
// flame still ramps through brightness up to a white-hot tip.
var fireDistAcc = 0;
var flameStampCache = {};
// Smoothed stroke velocity drives flame orientation. Decays back toward 0
// when the cursor stops, so resting flames point up.
var fireVelX = 0, fireVelY = 0;
var fireHasPrev = false;
var firePrevX = 0, firePrevY = 0;
var fireAnimFrame = null;
var fireLiveStamps = [];
var FIRE_SETTLE_MS = 300; // ms a stamp freezes before committing to canvas

// Six flame archetypes. Profile follows a beta-like curve
// hw(u) ∝ u^pa * (1-u)^pb so each silhouette bulges low and tapers smoothly,
// instead of the triangular pyramid a linear taper would give. Each variant
// gets distinct (pa, pb, width, height, lean, fork) so adjacent stamps look
// like different flames, not the same flame at different sizes.
// `curl` bends the flame's centerline (flames curl, they don't shoot straight
// up). `wob1`/`wob2` are two-octave edge noise for an irregular hand-drawn
// outline. lPhase/rPhase let left and right sides wobble independently so the
// silhouette isn't mirror-symmetric.
// wisp: 'L' or 'R' — draws a thin secondary tendril attached to that side of the
// upper body, as part of the same drawFlameDirectly call. null = no wisp.
var FLAME_VARIANTS = [
  {pa:0.48, pb:1.60, wMul:0.90, hMul:1.15, asym: 0.12, curl:0.14, cFreq:1.3, cPhase:0.0, wob1:0.05, wob2:0.02, lPhase:0.6,  rPhase:2.4},

    {r:0,max:baseR*2.6,col:'#ffffff',lw:2, table:buildNoiseTable(makeNoiseSeed(), 0.30)}
  ];
  var streaks=[], streakCols=['#ffcc00','#ff8800','#ffffff','#ff4400','#ffee99'];
  var streakCount=14+Math.floor(Math.random()*10);
  for(var i=0;i<streakCount;i++){
    streaks.push({
      ang:Math.random()*6.2832,
      head:6+Math.random()*30,
      tail:30+Math.random()*70,
      speed:14+Math.random()*22,
      thick:1+Math.floor(Math.random()*4),
      col:streakCols[Math.floor(Math.random()*streakCols.length)],
      life:1,
      decay:0.022+Math.random()*0.02
    });
  }
  // Chunky debris — mix square pixels with disc dots so shapes don't all rhyme.
  var debris=[], debrisCols=['#ff4400','#ff8800','#ffcc00','#ffff66','#ff2200','#ffffff','#332222'];
  for(var i=0;i<70;i++){
    var ang=Math.random()*6.2832, spd=3+Math.random()*11;
    debris.push({
      x:cx, y:cy,
      vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-Math.random()*3.5,
      size:2+Math.random()*7,
      col:debrisCols[Math.floor(Math.random()*debrisCols.length)],
      life:1,
      decay:0.013+Math.random()*0.022,
      shape: Math.random()<0.55 ? 'sq' : 'dot'
    });
  }
  var frame=0;
  function animBoom(){
    ovCtx.clearRect(0,0,canvasW,canvasH);

    for(var ri=0;ri<rings.length;ri++){
      var rg=rings[ri];
      rg.r=Math.min(rg.r+11,rg.max);
      var al=1-rg.r/rg.max;
      strokeJaggedRing(ovCtx, cx, cy, rg.r, rg.lw*al, rg.col, al, rg.table);
    }

    for(var si=0;si<streaks.length;si++){
      var s=streaks[si];
      if(s.life<=0) continue;
      s.head+=s.speed; s.tail+=s.speed*0.65; s.life-=s.decay;
      var headD=s.head, tailD=Math.max(0, s.head-s.tail);
      ovCtx.globalAlpha=Math.max(0,s.life);
      stampLine(ovCtx,
        cx+Math.cos(s.ang)*tailD, cy+Math.sin(s.ang)*tailD,
        cx+Math.cos(s.ang)*headD, cy+Math.sin(s.ang)*headD,
        getBrushStamp(s.thick, s.col));
    }
    ovCtx.globalAlpha=1;

    for(var pi=0;pi<debris.length;pi++){
      var p=debris[pi];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=p.decay;
      if(p.life<=0) continue;
      ovCtx.globalAlpha=p.life;
      if(p.shape==='sq'){
        var sz=Math.max(1, Math.round(p.size*p.life));
        ovCtx.fillStyle=p.col;
        ovCtx.fillRect(Math.round(p.x)-(sz>>1), Math.round(p.y)-(sz>>1), sz, sz);
      } else {
        stampDot(ovCtx, p.x, p.y, getBrushStamp(p.size*p.life*0.5, p.col));
      }
      ovCtx.globalAlpha=1;
    }

    if(++frame<100) requestAnimationFrame(animBoom);
    else ovCtx.clearRect(0,0,canvasW,canvasH);
  }
  animBoom();
}

// === DRAGGABLE TOOLS DOCK: top/bottom positioning ===
(function(){
  var shelf = document.getElementById('drag-shelf');
  var toggle = document.getElementById('dock-toggle');
  var area = document.getElementById('canvas-area');
  var dockPos = 'bottom';
  var EDGE = 18;
  var lastToggleAt = 0;

  function topPxFor(p){
    var ch = area.clientHeight;
    var sh = shelf.offsetHeight;
    return p === 'top' ? EDGE : Math.max(EDGE, ch - sh - EDGE);
  }
  function applyPos(instant){
    var icon = toggle.querySelector('.mir');
    if (instant) {
      shelf.style.transition = 'none';
      shelf.style.opacity = '1';
      shelf.style.top = topPxFor(dockPos) + 'px';
      shelf.setAttribute('data-dock-pos', dockPos);
      icon.textContent = dockPos === 'bottom' ? 'expand_less' : 'expand_more';
      return;
    }
    shelf.style.transition = 'opacity 0.32s ease';
    shelf.style.opacity = '0';
    setTimeout(function(){
      shelf.style.transition = 'none';
      shelf.style.top = topPxFor(dockPos) + 'px';
      shelf.setAttribute('data-dock-pos', dockPos);
      icon.textContent = dockPos === 'bottom' ? 'expand_less' : 'expand_more';
      shelf.offsetHeight;
      shelf.style.transition = 'opacity 0.55s ease';
      shelf.style.opacity = '1';
    }, 340);
  }
  function togglePos(){
    var now = Date.now();
    if (now - lastToggleAt < 920) return;
    lastToggleAt = now;
    dockPos = (dockPos === 'bottom') ? 'top' : 'bottom';
    applyPos();
  }

  toggle.addEventListener('click', function(e){ e.stopPropagation(); togglePos(); });
  toggle.addEventListener('pointerdown', function(e){ e.stopPropagation(); });
  toggle.addEventListener('mousedown', function(e){ e.stopPropagation(); });
  toggle.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive:true});

  // Initial placement after layout settles
  requestAnimationFrame(function(){ applyPos(true); });
  setTimeout(function(){ applyPos(true); }, 0);
  setTimeout(function(){ applyPos(true); }, 100);
  window.addEventListener('load', function(){ applyPos(true); });
  window.addEventListener('resize', function(){ applyPos(true); });

  // Stroke-through detection: toggle when an active stroke crosses the dock
  window.__dockStrokeHit = function(cx, cy){
    if (cx == null || cy == null) return;
    if (Date.now() - lastToggleAt < 480) return;
    var r = shelf.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      togglePos();
    }
  };

  // While drawing, let the stroke pass through dock items so cursor focus
  // doesn't block the canvas mousemove from firing.
  var canvas = document.getElementById('c');
  function setPassthrough(on){ shelf.classList.toggle('stroke-passthrough', !!on); }
  canvas.addEventListener('mousedown', function(){ setPassthrough(true); });
  window.addEventListener('mouseup', function(){ setPassthrough(false); });
  canvas.addEventListener('touchstart', function(){ setPassthrough(true); }, {passive:true});
  window.addEventListener('touchend', function(){ setPassthrough(false); });
  window.addEventListener('touchcancel', function(){ setPassthrough(false); });
})();
</script>
